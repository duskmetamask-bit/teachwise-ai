<svg xmlns="http://www.w3/svg" viewBox="0 0 120 120">
  <!-- Light blue friendly background -->
  <rect width="120" height="120" rx="24" fill="#EBF8FF"/>
  
  <!-- Soft owl body -->
  <ellipse cx="60" cy="72" rx="35" ry="38" fill="#4299E1"/>
  
  <!-- Light belly -->
  <ellipse cx="60" cy="78" rx="24" ry="26" fill="#BEE3F8"/>
  
  <!-- Super friendly eyes - big sparkle -->
  <circle cx="42" cy="55" r="17" fill="white"/>
  <circle cx="78" cy="55" r="17" fill="white"/>
  <circle cx="45" cy="55" r="10" fill="#2B6CB0"/>
  <circle cx="81" cy="55" r="10" fill="#2B6CB0"/>
  <!-- Happy shine -->
  <circle cx="49" cy="50" r="5" fill="white"/>
  <circle cx="85" cy="50" r="5" fill="white"/>
  <circle cx="42" cy="58" r="3" fill="white"/>
  <circle cx="78" cy="58" r="3" fill="white"/>
  
  <!-- Cute smile -->
  <path d="M52 68 Q60 76 68 68" stroke="#2B6CB0" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Small orange beak -->
  <ellipse cx="60" cy="72" rx="6" ry="4" fill="#F6AD55"/>
  
  <!-- Ears -->
  <ellipse cx="28" cy="40" rx="8" ry="12" fill="#4299E1"/>
  <ellipse cx="92" cy="40" rx="8" ry="12" fill="#4299E1"/>
  <ellipse cx="28" cy="42" rx="5" ry="7" fill="#90CDF4"/>
  <ellipse cx="92" cy="42" rx="5" ry="7" fill="#90CDF4"/>
  
  <!-- Wings -->
  <ellipse cx="26" cy="72" rx="12" ry="22" fill="#3182CE"/>
  <ellipse cx="94" cy="72" rx="12" ry="22" fill="#3182CE"/>
  
  <!-- Stars around head - wise! -->
  <polygon points="20,25 22,30 27,30 23,34 25,39 20,36 15,39 17,34 13,30 18,30" fill="#F6E05E"/>
  <polygon points="100,25 101,28 104,28 102,30 103,33 100,31 97,33 98,30 96,28 99,28" fill="#F6E05E"/>
  <circle cx="15" cy="35" r="2" fill="#F6E05E"/>
  <circle cx="105" cy="35" r="2" fill="#F6E05E"/>
  
  <!-- Graduation cap -->
  <rect x="40" y="20" width="40" height="5" rx="1" fill="#2B6CB0"/>
  <polygon points="60,12 44,21 60,26 76,21" fill="#2B6CB0"/>
  <line x1="60" y1="26" x2="60" y2="32" stroke="#2B6CB0" stroke-width="2"/>
  <circle cx="60" cy="34" r="2.5" fill="#F6E05E"/>
</svg>