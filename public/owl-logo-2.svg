<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Soft cream background -->
  <rect width="120" height="120" rx="24" fill="#F7FAFC"/>
  
  <!-- Round friendly body -->
  <ellipse cx="60" cy="72" rx="38" ry="40" fill="#6B8E23"/>
  
  <!-- Cream belly -->
  <ellipse cx="60" cy="78" rx="26" ry="28" fill="#FFFAF0"/>
  
  <!-- Big adorable eyes -->
  <circle cx="42" cy="55" r="18" fill="white"/>
  <circle cx="78" cy="55" r="18" fill="white"/>
  <!-- Happy pupils -->
  <circle cx="45" cy="55" r="9" fill="#1A365D"/>
  <circle cx="81" cy="55" r="9" fill="#1A365D"/>
  <!-- Sparkle eyes -->
  <circle cx="48" cy="51" r="5" fill="white"/>
  <circle cx="84" cy="51" r="5" fill="white"/>
  <circle cx="42" cy="58" r="3" fill="white"/>
  <circle cx="78" cy="58" r="3" fill="white"/>
  
  <!-- Rosy cheeks - friendly! -->
  <circle cx="28" cy="68" r="6" fill="#FED7D7" opacity="0.7"/>
  <circle cx="92" cy="68" r="6" fill="#FED7D7" opacity="0.7"/>
  
  <!-- Tiny cute beak -->
  <ellipse cx="60" cy="70" rx="6" ry="4" fill="#F6AD55"/>
  
  <!-- Soft wings -->
  <ellipse cx="24" cy="72" rx="10" ry="18" fill="#556B2F"/>
  <ellipse cx="96" cy="72" rx="10" ry="18" fill="#556B2F"/>
  
  <!-- Little round ears -->
  <circle cx="30" cy="38" r="10" fill="#6B8E23"/>
  <circle cx="90" cy="38" r="10" fill="#6B8E23"/>
  <circle cx="30" cy="40" r="6" fill="#9ACD32"/>
  <circle cx="90" cy="40" r="6" fill="#9ACD32"/>
  
  <!-- Book held in wing - teacher owl -->
  <rect x="90" y="60" width="18" height="24" rx="2" fill="#E53E3E"/>
  <rect x="92" y="62" width="14" height="20" rx="1" fill="#FEB2B2"/>
  <line x1="96" y1="66" x2="102" y2="66" stroke="#E53E3E" stroke-width="1"/>
  <line x1="96" y1="70" x2="102" y2="70" stroke="#E53E3E" stroke-width="1"/>
  <line x1="96" y1="74" x2="100" y2="74" stroke="#E53E3E" stroke-width="1"/>
</svg>