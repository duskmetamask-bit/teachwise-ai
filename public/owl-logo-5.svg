<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Light green friendly background -->
  <rect width="120" height="120" rx="24" fill="#F0FFF4"/>
  
  <!-- Green owl - fresh and friendly -->
  <ellipse cx="60" cy="72" rx="36" ry="40" fill="#48BB78"/>
  
  <!-- Light belly -->
  <ellipse cx="60" cy="78" rx="24" ry="26" fill="#C6F6D5"/>
  
  <!-- Big friendly eyes -->
  <circle cx="40" cy="52" r="18" fill="white"/>
  <circle cx="80" cy="52" r="18" fill="white"/>
  <circle cx="43" cy="52" r="10" fill="#276749"/>
  <circle cx="83" cy="52" r="10" fill="#276749"/>
  <!-- Sparkle -->
  <circle cx="47" cy="48" r="5" fill="white"/>
  <circle cx="87" cy="48" r="5" fill="white"/>
  <circle cx="40" cy="55" r="3" fill="white"/>
  <circle cx="80" cy="55" r="3" fill="white"/>
  
  <!-- Rosy cheeks -->
  <circle cx="26" cy="62" r="5" fill="#FED7D7" opacity="0.6"/>
  <circle cx="94" cy="62" r="5" fill="#FED7D7" opacity="0.6"/>
  
  <!-- Small cute beak -->
  <ellipse cx="60" cy="68" rx="7" ry="5" fill="#F6AD55"/>
  
  <!-- Ears -->
  <ellipse cx="28" cy="38" rx="9" ry="12" fill="#48BB78"/>
  <ellipse cx="92" cy="38" rx="9" ry="12" fill="#48BB78"/>
  <ellipse cx="28" cy="40" rx="5" ry="7" fill="#68D391"/>
  <ellipse cx="92" cy="40" rx="5" ry="7" fill="#68D391"/>
  
  <!-- Wings -->
  <ellipse cx="26" cy="72" rx="12" ry="22" fill="#38A169"/>
  <ellipse cx="94" cy="72" rx="12" ry="22" fill="#38A169"/>
  
  <!-- Graduation cap -->
  <rect x="38" y="18" width="44" height="6" rx="1" fill="#2B6CB0"/>
  <polygon points="60,10 40,20 60,26 80,20" fill="#2B6CB0"/>
  <line x1="60" y1="26" x2="60" y2="34" stroke="#2B6CB0" stroke-width="2"/>
  <circle cx="60" cy="36" r="3" fill="#F6E05E"/>
  
  <!-- Tassel -->
  <line x1="80" y1="20" x2="88" y2="30" stroke="#F6E05E" stroke-width="2"/>
  <circle cx="88" cy="32" r="3" fill="#F6E05E"/>
  
  <!-- Star - smart! -->
  <polygon points="60,95 63,102 70,102 65,107 67,114 60,110 53,114 55,107 50,102 57,102" fill="#F6E05E"/>
</svg>