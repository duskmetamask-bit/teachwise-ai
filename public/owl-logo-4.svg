<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Warm yellow background -->
  <rect width="120" height="120" rx="24" fill="#FFFAF0"/>
  
  <!-- Brown owl body -->
  <ellipse cx="60" cy="70" rx="32" ry="36" fill="#8B4513"/>
  
  <!-- Cream stripes belly -->
  <ellipse cx="60" cy="76" rx="20" ry="24" fill="#DEB887"/>
  <line x1="48" y1="68" x2="48" y2="88" stroke="#8B4513" stroke-width="2" opacity="0.3"/>
  <line x1="60" y1="62" x2="60" y2="92" stroke="#8B4513" stroke-width="2" opacity="0.3"/>
  <line x1="72" y1="68" x2="72" y2="88" stroke="#8B4513" stroke-width="2" opacity="0.3"/>
  
  <!-- Round friendly eyes -->
  <circle cx="44" cy="54" r="14" fill="white"/>
  <circle cx="76" cy="54" r="14" fill="white"/>
  <circle cx="46" cy="54" r="7" fill="#4A5568"/>
  <circle cx="78" cy="54" r="7" fill="#4A5568"/>
  <!-- Happy shine -->
  <circle cx="49" cy="51" r="3" fill="white"/>
  <circle cx="81" cy="51" r="3" fill="white"/>
  
  <!-- Happy closed-eye smile marks (wise) -->
  <path d="M36 50 Q44 46 52 50" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 50 Q76 46 84 50" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Small beak -->
  <polygon points="60,62 55,68 65,68" fill="#F6AD55"/>
  
  <!-- Ears -->
  <ellipse cx="34" cy="38" rx="8" ry="10" fill="#8B4513"/>
  <ellipse cx="86" cy="38" rx="8" ry="10" fill="#8B4513"/>
  <ellipse cx="34" cy="40" rx="5" ry="6" fill="#D2691E"/>
  <ellipse cx="86" cy="40" rx="5" ry="6" fill="#D2691E"/>
  
  <!-- Wings -->
  <ellipse cx="30" cy="68" rx="10" ry="18" fill="#A0522D"/>
  <ellipse cx="90" cy="68" rx="10" ry="18" fill="#A0522D"/>
  
  <!-- Graduation cap -->
  <rect x="38" y="22" width="44" height="5" rx="1" fill="#2B6CB0"/>
  <polygon points="60,14 42,23 60,28 78,23" fill="#2B6CB0"/>
  <line x1="60" y1="28" x2="60" y2="35" stroke="#2B6CB0" stroke-width="2"/>
  <circle cx="60" cy="37" r="3" fill="#F6E05E"/>
  
  <!-- Little feet -->
  <ellipse cx="50" cy="102" rx="10" ry="5" fill="#F6AD55"/>
  <ellipse cx="70" cy="102" rx="10" ry="5" fill="#F6AD55"/>
</svg>