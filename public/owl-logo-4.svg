<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="geo4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00A88A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="#0D1117"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#geo4)" stroke-width="2"/>
  <!-- Outer ring dots -->
  <circle cx="60" cy="8" r="3" fill="#00D4AA"/>
  <circle cx="60" cy="112" r="3" fill="#00D4AA"/>
  <circle cx="8" cy="60" r="3" fill="#00D4AA"/>
  <circle cx="112" cy="60" r="3" fill="#00D4AA"/>
  <circle cx="23" cy="23" r="2" fill="#00D4AA" opacity="0.6"/>
  <circle cx="97" cy="23" r="2" fill="#00D4AA" opacity="0.6"/>
  <circle cx="23" cy="97" r="2" fill="#00D4AA" opacity="0.6"/>
  <circle cx="97" cy="97" r="2" fill="#00D4AA" opacity="0.6"/>
  <!-- Owl head - geometric hexagon style -->
  <polygon points="60,30 85,45 85,75 60,90 35,75 35,45" fill="#1a2332" stroke="#00D4AA" stroke-width="1.5"/>
  <!-- Triangle ear accents -->
  <polygon points="35,45 25,30 40,35" fill="#1a2332" stroke="#00D4AA" stroke-width="1"/>
  <polygon points="85,45 95,30 80,35" fill="#1a2332" stroke="#00D4AA" stroke-width="1"/>
  <!-- Geometric eyes -->
  <polygon points="45,48 55,42 55,54 45,60 35,54 35,42" fill="#0D1117" stroke="#00D4AA" stroke-width="1"/>
  <polygon points="75,48 85,42 85,54 75,60 65,54 65,42" fill="#0D1117" stroke="#00D4AA" stroke-width="1"/>
  <!-- Pupils -->
  <circle cx="45" cy="51" r="4" fill="#00D4AA"/>
  <circle cx="75" cy="51" r="4" fill="#00D4AA"/>
  <circle cx="46" cy="50" r="1.5" fill="#fff"/>
  <circle cx="76" cy="50" r="1.5" fill="#fff"/>
  <!-- Beak - geometric diamond -->
  <polygon points="60,58 55,66 60,74 65,66" fill="#00D4AA"/>
  <!-- Body - geometric -->
  <polygon points="60,85 90,95 90,108 60,115 30,108 30,95" fill="#1a2332" stroke="#00D4AA" stroke-width="1.5"/>
  <!-- Belly lines -->
  <line x1="60" y1="90" x2="60" y2="112" stroke="#00D4AA" stroke-width="0.5" opacity="0.5"/>
  <line x1="45" y1="95" x2="45" y2="110" stroke="#00D4AA" stroke-width="0.5" opacity="0.5"/>
  <line x1="75" y1="95" x2="75" y2="110" stroke="#00D4AA" stroke-width="0.5" opacity="0.5"/>
  <!-- Pencil -->
  <rect x="88" y="70" width="6" height="35" rx="1" fill="#00D4AA" transform="rotate(20, 91, 87)"/>
  <polygon points="91,100 88,110 94,110" fill="#1a2332" transform="rotate(20, 91, 87)"/>
  <rect x="88" y="68" width="6" height="5" fill="#1a2332" transform="rotate(20, 91, 87)"/>
</svg>